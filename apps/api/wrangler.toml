name = "kongsian-api"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# === Workers Cron Triggers ===
# onCronTrigger dispatches by `event.cron` (see apps/api/src/cron.ts).
#   "* * * * *"   Every minute — WA dispatch (notifications + OTPs, D1-backed)
#   "0 14 * * *"  Daily 14:00 UTC = 21:00 WIB — closing reminders
#   "59 16 * * 7" Weekly Sun 16:59 UTC = Sun 23:59 WIB — settlement generator
#   NOTE: CF accepts both 0 and 7 for Sunday, but `event.cron` is the literal string from wrangler.toml.
#   Keep this string and the branch in src/cron.ts in lockstep.
[triggers]
crons = ["* * * * *", "0 14 * * *", "59 16 * * 7"]

# Production observability
[observability]
enabled = true

# === D1 binding (Kongsian database) ===
[[d1_databases]]
binding = "kongsian_db"
database_name = "kongsian-db"
database_id = "94a52c2f-af08-4642-b477-4edc2251f52b"
migrations_dir = "../../packages/db/migrations"

# === R2 binding (Kongsian media: titip/tarik photos, dispute photos, payment proof, PDF cache) ===
# TODO(week4-f0): enable R2 in Cloudflare dashboard first, then create buckets:
#   wrangler r2 bucket create kongsian-media
#   wrangler r2 bucket create kongsian-media-dev
# Then uncomment [[r2_buckets]] below. Key prefix convention:
#   photos/titip/{movementId}.jpg
#   photos/tarik/{movementId}.jpg
#   photos/closing/{closingId}/{lineId}.jpg
#   photos/dispute/{disputeId}/{messageId}.jpg
#   payments/{settlementId}/proof.{ext}
#   pdf/settlements/{settlementId}.pdf
[[r2_buckets]]
binding = "KONGSIAN_BUCKET"
bucket_name = "kongsian-media"
preview_bucket_name = "kongsian-media-dev"

# === Production vars (overridable per-env via wrangler --env or in dashboard) ===
# P0 #1: ENV must be "production" on the deployed Worker so the OTP endpoint
# does not return the plaintext devCode. Local dev uses wrangler dev with
# .dev.vars / wrangler.<env>.toml override, not this file.
[vars]
ENV = "production"
LOG_LEVEL = "info"
APP_URL = "https://kongsian.app"
OTP_TTL_SECONDS = "300"
OTP_MAX_ATTEMPTS = "5"
SESSION_TTL_SECONDS = "2592000"

# === Dev environment: returns devCode in OTP request response.
# Used for end-to-end UI testing without WA integration.
# Deploy:  pnpm --filter @kongsian/api exec wrangler deploy --env dev
# Per CF docs, [[d1_databases]] and [[r2_buckets]] can be set in env blocks
# (they override the top-level bindings for that env). Bindings below point
# at the same prod D1 + R2 — safe for the Week-5 testing pilot since we're
# the only operator. Worker name is overridden so prod and dev deploys don't
# collide.
[env.dev]
name = "kongsian-api-dev"

[env.dev.vars]
ENV = "development"
LOG_LEVEL = "debug"
APP_URL = "https://kongsian.app"
OTP_TTL_SECONDS = "300"
OTP_MAX_ATTEMPTS = "5"
SESSION_TTL_SECONDS = "2592000"

[[env.dev.d1_databases]]
binding = "kongsian_db"
database_name = "kongsian-db"
database_id = "94a52c2f-af08-4642-b477-4edc2251f52b"
migrations_dir = "../../packages/db/migrations"

[[env.dev.r2_buckets]]
binding = "KONGSIAN_BUCKET"
bucket_name = "kongsian-media"
preview_bucket_name = "kongsian-media-dev"
