name = "kongsian-api"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# === Workers Cron Triggers ===
# onCronTrigger runs every minute; see apps/api/src/cron.ts.
[triggers]
crons = ["* * * * *"]

# Production observability
[observability]
enabled = true

# === D1 binding (Kongsian database) ===
[[d1_databases]]
binding = "kongsian_db"
database_name = "kongsian-db"
database_id = "94a52c2f-af08-4642-b477-4edc2251f52b"
migrations_dir = "../../packages/db/migrations"

# === Local-only vars (overridable by .dev.vars) ===
[vars]
ENV = "development"
LOG_LEVEL = "debug"
APP_URL = "http://localhost:4321"
OTP_TTL_SECONDS = "300"
OTP_MAX_ATTEMPTS = "5"
SESSION_TTL_SECONDS = "2592000"
