name = "kongsian-api"
main = "src/index.ts"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]

# === Workers Cron Triggers ===
# onCronTrigger dispatches by `event.cron` (see apps/api/src/cron.ts).
#   "* * * * *"   Every minute — WA dispatch (notifications + OTPs, D1-backed)
#   "0 14 * * *"  Daily 14:00 UTC = 21:00 WIB — closing reminders
#   "59 16 * * 7" Weekly Sun 16:59 UTC = Sun 23:59 WIB — settlement generator
[triggers]
crons = ["* * * * *", "0 14 * * *", "59 16 * * 7"]

# Production observability
[observability]
enabled = true

# === D1 binding (Kongsian database) ===
[[d1_databases]]
binding = "kongsian_db"
database_name = "kongsian-db"
database_id = "94a52c2f-af08-4642-b477-4edc2251f52b"
migrations_dir = "../../packages/db/migrations"

# === Production vars (overridable per-env via wrangler --env or in dashboard) ===
# P0 #1: ENV must be "production" on the deployed Worker so the OTP endpoint
# does not return the plaintext devCode. Local dev uses wrangler dev with
# .dev.vars / wrangler.<env>.toml override, not this file.
[vars]
ENV = "production"
LOG_LEVEL = "info"
APP_URL = "https://kongsian.app"
OTP_TTL_SECONDS = "300"
OTP_MAX_ATTEMPTS = "5"
SESSION_TTL_SECONDS = "2592000"
