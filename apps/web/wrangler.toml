name = "kongsian-web"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# === D1 binding (Kongsian database) ===
[[d1_databases]]
binding = "kongsian_db"
database_name = "kongsian-db"
database_id = "94a52c2f-af08-4642-b477-4edc2251f52b"
migrations_dir = "../../packages/db/migrations"

[vars]
ENV = "development"
LOG_LEVEL = "info"
APP_URL = "https://kongsian.app"
OTP_TTL_SECONDS = "300"
OTP_MAX_ATTEMPTS = "5"
SESSION_TTL_SECONDS = "2592000"
PUBLIC_API_URL = "https://kongsian-api.thegavriel-co.workers.dev"
