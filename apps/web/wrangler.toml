name = "kongsian-web"
compatibility_date = "2024-11-12"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "./dist"

# === D1 binding (Kongsian database) ===
[[d1_databases]]
binding = "kongsian_db"
database_name = "kongsian-db-apac"
database_id = "477704de-7334-46aa-8b70-4ee8cfbbad3e"
migrations_dir = "../../packages/db/migrations"

[vars]
ENV = "production"
LOG_LEVEL = "info"
APP_URL = "https://oatlet.com"
OTP_TTL_SECONDS = "300"
OTP_MAX_ATTEMPTS = "5"
SESSION_TTL_SECONDS = "2592000"
PUBLIC_API_URL = "https://api.oatlet.com"