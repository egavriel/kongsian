name: Deploy to Cloudflare

on:
  push:
    branches:
      - main
  # Allows manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: cloudflare
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Sync D1 Migrations Table
        working-directory: packages/db
        run: |
          npx wrangler d1 execute kongsian-db --remote --command="INSERT OR IGNORE INTO d1_migrations (id, name, applied_at) VALUES (3, '0002_amber_verification.sql', '2026-06-13 05:05:35'), (4, '0003_week3_dispute_messages.sql', '2026-06-13 05:05:36');"
          npx wrangler d1 execute kongsian-db --remote --command="DELETE FROM partnerships WHERE brand_id NOT IN (SELECT id FROM brands) OR tenant_id NOT IN (SELECT id FROM tenants);"
          npx wrangler d1 execute kongsian-db --remote --command="DELETE FROM partnership_skus WHERE partnership_id NOT IN (SELECT id FROM partnerships) OR sku_id NOT IN (SELECT id FROM skus);"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Database Migrations
        run: pnpm --filter @kongsian/db migrate:apply:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy API & Web
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
